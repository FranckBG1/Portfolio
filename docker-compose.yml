version: "3.9"

services:
  # ── Développement ──────────────────────────────────────────────────────────
  portfolio-dev:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules        # empêche l'écrasement par le volume host
      - /app/.next               # cache Next.js isolé dans le conteneur
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    command: sh -c "npm install && npm run dev"
    profiles: [dev]

  # ── Production ────────────────────────────────────────────────────────────
  portfolio-prod:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    profiles: [prod]
